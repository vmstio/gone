name = "gone"
main = "worker.js"
compatibility_date = "2026-07-01"

# Workers Logs (persisted/queryable in the dashboard). invocation_logs is
# disabled since it duplicates this Worker's own console.log line for every
# request.
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

# Health checks aren't logged. Set to "false" to disable all request logging.
[vars]
LOG_REQUESTS = "true"

# Bundle logo.svg as a raw text string rather than a binary asset, so it can
# be base64-encoded into the page template at module load time.
[[rules]]
type = "Text"
globs = ["**/*.svg"]
fallthrough = true

[[routes]]
pattern = "vmst.io"
custom_domain = true

# Wildcard route for all vmst.io subdomains (www, matrix, docs, status, cdn,
# dna, and any future ones). Unlike custom_domain routes, this requires a
# wildcard DNS record (orange-clouded) to already exist in the zone, and
# Wrangler will not manage DNS/certs for it.
[[routes]]
pattern = "*.vmst.io/*"
zone_name = "vmst.io"
