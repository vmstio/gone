name = "gone"
main = "worker.js"
compatibility_date = "2026-07-01"

# Workers Logs (persisted/queryable in the dashboard). invocation_logs is
# disabled since it duplicates this Worker's own console.log line for every
# request.
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

# Health checks aren't logged. Set to "false" to disable all request logging.
[vars]
LOG_REQUESTS = "true"

# Bundle logo.svg as a raw text string rather than a binary asset, so it can
# be base64-encoded into the page template at module load time.
[[rules]]
type = "Text"
globs = ["**/*.svg"]
fallthrough = true

# Each hostname's zone must already be an active zone in this Cloudflare
# account (orange-clouded DNS) for these to take effect. custom_domain = true
# lets Wrangler create/manage the DNS record and certificate for each hostname.
[[routes]]
pattern = "vmcrawl.com"
custom_domain = true

# Wildcard route for all vmcrawl.com subdomains (www and any future ones).
# Requires a wildcard DNS record (orange-clouded) to already exist in the
# zone; Wrangler will not manage DNS/certs for it.
[[routes]]
pattern = "*.vmcrawl.com/*"
zone_name = "vmcrawl.com"

[[routes]]
pattern = "mastoreqs.com"
custom_domain = true

# Wildcard route for all mastoreqs.com subdomains (www and any future ones).
# Requires a wildcard DNS record (orange-clouded) to already exist in the
# zone; Wrangler will not manage DNS/certs for it.
[[routes]]
pattern = "*.mastoreqs.com/*"
zone_name = "mastoreqs.com"

[[routes]]
pattern = "vmst.io"
custom_domain = true

# Wildcard route for all vmst.io subdomains (www, matrix, docs, status, cdn,
# dna, and any future ones). Unlike custom_domain routes, this requires a
# wildcard DNS record (orange-clouded) to already exist in the zone, and
# Wrangler will not manage DNS/certs for it.
[[routes]]
pattern = "*.vmst.io/*"
zone_name = "vmst.io"
