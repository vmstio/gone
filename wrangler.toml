name = "gone"
main = "worker.js"
compatibility_date = "2026-07-01"

# Workers Logs (persisted/queryable in the dashboard) plus basic per-
# invocation logs, in addition to this Worker's own console.log lines.
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Health checks aren't logged. Set to "false" to disable all request logging.
[vars]
LOG_REQUESTS = "true"

# Bundle logo.svg as a raw text string rather than a binary asset, so it can
# be base64-encoded into the page template at module load time.
[[rules]]
type = "Text"
globs = ["**/*.svg"]
fallthrough = true

# Each hostname's zone must already be an active zone in this Cloudflare
# account (orange-clouded DNS) for these to take effect. custom_domain = true
# lets Wrangler create/manage the DNS record and certificate for each hostname.
#
# Temporarily commented out to isolate a deploy-time HTTP 400: attaching a
# custom domain fails the whole deploy if its zone isn't active in this
# account, the hostname is already bound to another Worker/Pages project, or a
# conflicting DNS record exists. With these removed the Worker deploys to its
# workers.dev subdomain only; re-enable them one at a time to find the
# offending hostname.
