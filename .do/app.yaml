name: gone
# Data center region. Slugs: nyc, sfo, ams, fra, lon, tor, blr, syd, sgp.
region: tor
services:
  - name: web
    # Build from the Go buildpack (no Dockerfile needed). Update the repo
    # reference to match your GitHub repo if you deploy via the dashboard.
    github:
      repo: vmstio/gone
      branch: main
      deploy_on_push: true
    environment_slug: go
    # Instance size. Shared CPU: apps-s-1vcpu-0.5gb (smallest/cheapest),
    # apps-s-1vcpu-1gb, apps-s-1vcpu-2gb, apps-s-2vcpu-4gb. Dedicated CPU:
    # apps-d-1vcpu-1gb, apps-d-1vcpu-2gb, apps-d-2vcpu-4gb, apps-d-2vcpu-8gb,
    # apps-d-4vcpu-8gb, apps-d-4vcpu-16gb, apps-d-8vcpu-32gb.
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080
    # The app returns 410 for all real traffic, which App Platform would treat
    # as unhealthy, so health checks target the dedicated /healthz endpoint.
    health_check:
      http_path: /healthz
