name: Test and Deploy Worker

# Run the test suite on every pull request and push to main, then deploy to
# Cloudflare Workers from pushes to main only, as an alternative to
# Cloudflare's Git-connected Workers Builds. The deploy runs the same
# `wrangler deploy` that works locally.
#
# Requires one repository secret:
#   CLOUDFLARE_API_TOKEN - a token with the "Edit Cloudflare Workers"
#     permission (Account > Workers Scripts > Edit). Once the custom-domain
#     routes are re-enabled in wrangler.toml, the token also needs Zone > DNS >
#     Edit and Zone > Workers Routes > Edit for each attached zone.
#
# If the token can access more than one Cloudflare account, also add a
# CLOUDFLARE_ACCOUNT_ID secret and pass it as `accountId:` below.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

  deploy:
    # Pull requests only run the test job; deploys happen from main.
    if: github.event_name != 'pull_request' && needs.test.result == 'success'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
